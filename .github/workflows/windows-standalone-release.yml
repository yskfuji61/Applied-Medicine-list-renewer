name: Windows Standalone Release

on:
  workflow_dispatch:

jobs:
  build-windows-standalone:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = 'src'
          python -m unittest tests.test_profile

      - name: Build standalone release
        shell: pwsh
        run: |
          $env:PHARMALIST_SKIP_DATA_BUNDLE = '1'
          .\scripts\build_windows_standalone.ps1

      - name: Upload standalone release folder
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone-release
          path: dist/windows-standalone-release

      - name: Upload standalone zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone-zip
          path: dist/薬剤リスト変換アプリ-standalone-windows.zip