name: Windows Standalone Release

on:
  workflow_dispatch:
    inputs:
      sign_artifacts:
        description: Sign the Windows standalone bundle before zipping
        required: true
        default: true
        type: boolean
      release_tag:
        description: Optional release tag to upload integrity assets to
        required: false
        default: ''
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-windows-standalone:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release upload prerequisites
        if: ${{ inputs.release_tag != '' && !inputs.sign_artifacts }}
        shell: pwsh
        run: |
          throw 'release_tag を指定して release へ integrity asset を載せる場合、sign_artifacts は true 必須です。'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Prepare signing certificate
        if: ${{ inputs.sign_artifacts }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            throw 'WINDOWS_CERTIFICATE_BASE64 が未設定です。'
          }
          $certPath = Join-Path $env:RUNNER_TEMP 'windows-release-signing.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          "WINDOWS_CERT_PFX_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = 'src'
          python -m unittest tests.test_profile

      - name: Build standalone release
        shell: pwsh
        env:
          WINDOWS_SIGN_ENABLED: ${{ inputs.sign_artifacts && '1' || '0' }}
          WINDOWS_CERT_PFX_PATH: ${{ env.WINDOWS_CERT_PFX_PATH }}
          WINDOWS_CERT_PFX_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: .\scripts\build_windows_standalone.ps1

      - name: Generate integrity assets
        shell: pwsh
        run: |
          python .\scripts\generate_release_integrity.py `
            --output-dir dist `
            --checksum-name SHA256SUMS-windows.txt `
            --manifest-name release-manifest-windows.json `
            --release-tag "${{ inputs.release_tag }}" `
            --commit "${{ github.sha }}" `
            --asset dist/薬剤リスト変換アプリ-standalone-windows.zip

      - name: Attest standalone zip and integrity assets
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/薬剤リスト変換アプリ-standalone-windows.zip
            dist/SHA256SUMS-windows.txt
            dist/release-manifest-windows.json

      - name: Audit standalone zip contents
        shell: pwsh
        run: |
          $zipPath = 'dist/薬剤リスト変換アプリ-standalone-windows.zip'
          $auditDir = 'dist/windows-standalone-audit'
          $extractDir = Join-Path $auditDir 'extracted'
          $listingPath = Join-Path $auditDir 'zip-entries.txt'
          $summaryPath = Join-Path $auditDir 'audit-summary.txt'
          $forbiddenPattern = '__MACOSX|(^|[\\/])\._|(^|[\\/])\.DS_Store$|260508_Musashino_採用医薬品|旧採用医薬品リスト'

          Remove-Item -Recurse -Force $auditDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $auditDir | Out-Null

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zipPath))
          try {
            $entries = $archive.Entries | ForEach-Object { $_.FullName }
            $entries | Set-Content -Encoding utf8 $listingPath
            if ($entries | Where-Object { $_ -match $forbiddenPattern }) {
              throw 'Standalone zip contains forbidden bundled data or metadata entries.'
            }
          }
          finally {
            $archive.Dispose()
          }

          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $appRoot = Join-Path $extractDir '薬剤リスト変換アプリ'
          $exePath = Join-Path $appRoot '薬剤リスト変換アプリ.exe'
          if (-not (Test-Path $appRoot -PathType Container)) {
            throw 'Expanded zip did not reconstruct the expected application directory.'
          }
          if (-not (Test-Path $exePath -PathType Leaf)) {
            throw 'Expanded zip did not reconstruct the expected standalone executable.'
          }

          @(
            "zip=$zipPath"
            "entries=$($entries.Count)"
            "app_root=$appRoot"
            "exe=$exePath"
            'forbidden_entries=none'
            'expanded_executable=yes'
          ) | Set-Content -Encoding utf8 $summaryPath

      - name: Upload standalone audit
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone-audit
          path: dist/windows-standalone-audit

      - name: Upload standalone release folder
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone-release
          path: dist/windows-standalone-release

      - name: Upload standalone zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone-zip
          path: dist/薬剤リスト変換アプリ-standalone-windows.zip

      - name: Upload integrity assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone-integrity
          path: |
            dist/SHA256SUMS-windows.txt
            dist/release-manifest-windows.json

      - name: Upload integrity assets to release
        if: ${{ inputs.release_tag != '' && inputs.sign_artifacts }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.release_tag }}" `
            dist/SHA256SUMS-windows.txt `
            dist/release-manifest-windows.json `
            --clobber